services:
  - type: web
    name: khlus-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && cd apps/api && npx prisma generate && npx prisma db push --skip-generate
    startCommand: cd apps/api && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
